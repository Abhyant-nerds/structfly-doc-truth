<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthForge Review Intake</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell shell-intake">
    <section class="hero-card">
      <p class="eyebrow">Human Review Loop</p>
      <h1>Upload a use case batch for field review</h1>
      <p class="lede">Name the use case, attach multiple files, and generate draft field suggestions for human validation.</p>
    </section>

    <section class="panel">
      <form id="batch-form" class="stack-form">
        <label class="field-block">
          <span>Use Case Name</span>
          <input id="use_case_name" name="use_case_name" type="text" placeholder="Invoice Summary Extraction" required>
        </label>

        <label class="field-block">
          <span>Documents</span>
          <input id="files" name="files" type="file" multiple required>
        </label>

        <div class="button-row">
          <button id="submit-button" type="submit">Create Review Batch</button>
          <p id="status-text" class="status-text"></p>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("batch-form");
    const button = document.getElementById("submit-button");
    const statusText = document.getElementById("status-text");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      statusText.textContent = "Processing documents. This can take some time for PDFs and other file-native model calls.";

      const payload = new FormData(form);
      try {
        const response = await fetch("/api/review-batches", {
          method: "POST",
          body: payload,
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Failed to create review batch");
        }

        window.location.href = data.review_url;
      } catch (error) {
        statusText.textContent = error.message;
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
